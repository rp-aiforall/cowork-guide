<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Cowork Training Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui,sans-serif);font-size:15px;line-height:1.7;color:var(--color-text-primary);background:var(--color-background-tertiary,#f5f5f3)}
.shell{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:272px;min-width:272px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-logo{font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.sidebar-title{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.35}
.progress-bar-wrap{margin-top:9px;height:3px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:#378ADD;border-radius:4px;transition:width .4s}
.progress-label{font-size:10px;color:var(--color-text-tertiary);margin-top:4px}

/* Dept switcher */
.dept-bar{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:4px;flex-wrap:wrap}
.dept-btn{font-size:11px;padding:4px 9px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-weight:400;transition:all .15s;white-space:nowrap}
.dept-btn:hover{background:var(--color-background-tertiary);color:var(--color-text-primary)}
.dept-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.dept-btn.dept-fin{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.dept-btn.dept-fin.active{background:#27500A;color:#fff;border-color:#27500A}
.dept-btn.dept-sales{background:#FAEEDA;color:#633806;border-color:#FAC775}
.dept-btn.dept-sales.active{background:#633806;color:#fff;border-color:#633806}
.dept-btn.dept-eng{background:#EEEDFE;color:#3C3489;border-color:#CECBF6}
.dept-btn.dept-eng.active{background:#3C3489;color:#fff;border-color:#3C3489}
.dept-btn.dept-hr{background:#FAECE7;color:#4A1B0C;border-color:#F5C4B3}
.dept-btn.dept-hr.active{background:#4A1B0C;color:#fff;border-color:#4A1B0C}
.dept-btn.dept-mkt{background:#FBEAF0;color:#4B1528;border-color:#F4C0D1}
.dept-btn.dept-mkt.active{background:#4B1528;color:#fff;border-color:#4B1528}
.dept-btn.dept-legal{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.dept-btn.dept-legal.active{background:#0C447C;color:#fff;border-color:#0C447C}
.dept-btn.dept-cs{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.dept-btn.dept-cs.active{background:#085041;color:#fff;border-color:#085041}

.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-group{padding:8px 14px 2px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12.5px;color:var(--color-text-secondary);border:none;background:none;width:100%;text-align:left;transition:background .12s}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-info,#E6F1FB);color:#185FA5;font-weight:500}
.nav-item.active .nav-num{color:#378ADD}
.nav-item.visited .check{opacity:1}
.nav-num{font-size:10px;color:var(--color-text-tertiary);min-width:18px;font-variant-numeric:tabular-nums}
.check{width:13px;height:13px;margin-left:auto;opacity:0;flex-shrink:0}
.nav-divider{height:0.5px;background:var(--color-border-tertiary);margin:5px 0}
.sidebar-footer{padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary)}
.reset-btn{font-size:11px;color:var(--color-text-tertiary);background:none;border:none;cursor:pointer;padding:0}
.reset-btn:hover{color:var(--color-text-secondary)}

/* Content */
.content{flex:1;overflow-y:auto;padding:36px 44px 72px}
.content-inner{max-width:740px}
.section-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.03em}
.badge-core{background:#E6F1FB;color:#185FA5}
.badge-fin{background:#EAF3DE;color:#27500A}
.badge-sales{background:#FAEEDA;color:#633806}
.badge-eng{background:#EEEDFE;color:#3C3489}
.badge-hr{background:#FAECE7;color:#4A1B0C}
.badge-mkt{background:#FBEAF0;color:#4B1528}
.badge-legal{background:#E6F1FB;color:#0C447C}
.badge-cs{background:#E1F5EE;color:#085041}
h1{font-size:25px;font-weight:500;line-height:1.25;margin-bottom:6px}
.subtitle{font-size:15px;color:var(--color-text-secondary);margin-bottom:22px;line-height:1.5}
.section-body p{margin-bottom:14px}
.info-box{border-left:3px solid #378ADD;background:#E6F1FB;border-radius:0 6px 6px 0;padding:11px 15px;margin:14px 0;font-size:13.5px;color:#185FA5}
.warn-box{border-left:3px solid #EF9F27;background:#FAEEDA;border-radius:0 6px 6px 0;padding:11px 15px;margin:14px 0;font-size:13.5px;color:#633806}
.success-box{border-left:3px solid #639922;background:#EAF3DE;border-radius:0 6px 6px 0;padding:11px 15px;margin:14px 0;font-size:13.5px;color:#27500A}
h2{font-size:17px;font-weight:500;margin:24px 0 8px}
h3{font-size:14px;font-weight:500;margin:18px 0 6px}
ul,ol{margin:6px 0 12px 18px}
li{margin-bottom:4px;font-size:14.5px}
table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
th{background:var(--color-background-secondary);padding:7px 11px;text-align:left;font-weight:500;font-size:11.5px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 11px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:var(--color-background-secondary)}
code{font-family:var(--font-mono,monospace);font-size:12px;background:var(--color-background-secondary);padding:2px 5px;border-radius:4px}
pre{background:#1e2330;border-radius:8px;padding:14px;margin:14px 0;overflow-x:auto}
pre code{background:none;color:#c9d1e0;font-size:11.5px;padding:0}
.step-flow{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin:14px 0}
.step-pill{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:500;white-space:nowrap}
.step-arrow{color:var(--color-text-tertiary);font-size:13px}
.screenshot-placeholder{background:var(--color-background-secondary);border:0.5px dashed var(--color-border-secondary);border-radius:8px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:14px 0;gap:7px}
.screenshot-placeholder span{font-size:11.5px;color:var(--color-text-tertiary);text-align:center;max-width:240px;line-height:1.4;font-style:italic}
.prompt-block{position:relative;background:#1e2330;border-radius:8px;padding:14px 44px 14px 14px;margin:10px 0}
.prompt-block code{color:#c9d1e0;font-size:12px;white-space:pre-wrap;word-break:break-word;background:none;padding:0}
.copy-btn{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.15);border-radius:5px;padding:3px 8px;font-size:11px;color:#a0aabf;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.go-deeper{display:flex;align-items:center;gap:12px;margin-top:28px;padding:16px 18px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px}
.go-deeper-text strong{font-size:13.5px;font-weight:500;display:block;margin-bottom:1px}
.go-deeper-text span{font-size:12px;color:var(--color-text-secondary)}
.go-deeper-btn{display:inline-flex;align-items:center;gap:5px;background:#185FA5;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .15s;flex-shrink:0}
.go-deeper-btn:hover{background:#0C447C}
.dept-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:13px}
</style>
</head>
<body>

<div class="shell">
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">RealPage</div>
    <div class="sidebar-title">Claude Cowork Training Guide</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
    <div class="progress-label" id="plabel">0 of 0 sections visited</div>
  </div>
  <div class="dept-bar" id="dept-bar"></div>
  <nav class="sidebar-nav" id="nav"></nav>
  <div class="sidebar-footer"><button class="reset-btn" onclick="resetProgress()">Reset progress</button></div>
</aside>
<main class="content" id="main">
  <div class="content-inner" id="section-content"></div>
</main>
</div>

<script>
const DEPTS = [
  {id:'core', label:'Core', cls:'', badgeCls:'badge-core', color:'#185FA5'},
  {id:'fin',  label:'Finance', cls:'dept-fin', badgeCls:'badge-fin', color:'#27500A'},
  {id:'sales',label:'Sales', cls:'dept-sales', badgeCls:'badge-sales', color:'#633806'},
  {id:'eng',  label:'Product & Eng', cls:'dept-eng', badgeCls:'badge-eng', color:'#3C3489'},
  {id:'hr',   label:'HR / People', cls:'dept-hr', badgeCls:'badge-hr', color:'#4A1B0C'},
  {id:'mkt',  label:'Marketing', cls:'dept-mkt', badgeCls:'badge-mkt', color:'#4B1528'},
  {id:'legal',label:'Legal', cls:'dept-legal', badgeCls:'badge-legal', color:'#0C447C'},
  {id:'cs',   label:'Customer Success', cls:'dept-cs', badgeCls:'badge-cs', color:'#085041'},
];

const ALL_SECTIONS = [
// ── CORE ──────────────────────────────────────────────────────────────────
{dept:'core',id:'c-welcome',num:'01',group:'Getting Started',title:'Welcome & overview',subtitle:'What Cowork is and how this guide works.',
content:`<p>This guide covers everything you need to start using Claude Cowork — Anthropic's desktop AI agent that executes real tasks on your computer, not just answers questions.</p>
<div class="info-box">Use the department tabs above the sidebar to navigate to role-specific modules after completing the core sections.</div>
<h2>What you'll learn</h2>
<ul><li>How Cowork differs from Claude Chat</li><li>How to set it up on your Windows PC</li><li>How to connect Microsoft 365 (Outlook, Teams, OneDrive, SharePoint)</li><li>How to write tasks that get great results</li><li>Department-specific workflows for your role</li></ul>
<h2>How to use this guide</h2>
<p>Work through the <strong>Core</strong> sections first (01–08). Then switch to your department tab for role-specific prompts and workflows. Every section ends with a <strong>Practice with Claude</strong> button that opens a live, pre-loaded conversation.</p>`,
prompt:'I\'m starting to learn Claude Cowork at RealPage. Give me a plain-English overview of what it is, how it differs from Claude Chat, and the 3 most important things I should set up first.'},

{dept:'core',id:'c-whatis',num:'02',group:'Getting Started',title:'Cowork vs. Chat vs. Code',subtitle:'Which tool to use and when.',
content:`<p>Claude has three modes. Picking the right one makes a big difference.</p>
<table><tr><th></th><th>Claude Chat</th><th>Claude Cowork</th><th>Claude Code</th></tr>
<tr><td>Best for</td><td>Questions, brainstorming, drafts</td><td>Autonomous file work & workflows</td><td>Software development</td></tr>
<tr><td>How you interact</td><td>Back-and-forth conversation</td><td>Describe outcome, step away</td><td>Hands-on coding with Claude</td></tr>
<tr><td>File access</td><td>Upload manually each time</td><td>Persistent folder access, read/write</td><td>Full project directory</td></tr>
<tr><td>Scheduling</td><td>No</td><td>Yes — daily, weekly tasks</td><td>No</td></tr>
<tr><td>Integrations</td><td>Available in chat, per-conversation</td><td>M365, Teams, Slack, CRM, and more</td><td>Git, package managers</td></tr></table>
<div class="info-box">Rule of thumb: brainstorm in Chat → execute in Cowork → build software in Code.</div>
<h2>What Cowork can do with your files</h2>
<ul><li>Read Excel, Word, PDF, and other supported business documents</li><li>Create drafts, summaries, and structured outputs from those files</li><li>Rename, sort, and organize folders</li><li>Extract and summarize data across many documents</li><li>Run tasks on a schedule (e.g., every Monday at 8 AM)</li></ul>
<div class="warn-box">Cowork only accesses folders you explicitly grant it permission to see. It always shows its plan before taking significant actions and will never permanently delete a file without your approval.</div>`,
prompt:'Give me 5 examples of tasks I should handle in Claude Chat vs. 5 that belong in Claude Cowork. I work at RealPage and use Microsoft 365.'},

{dept:'core',id:'c-install',num:'03',group:'Setup',title:'Download & install',subtitle:'Get Claude Desktop running on Windows.',
content:`<div class="step-flow"><div class="step-pill">Go to claude.com/download</div><div class="step-arrow">→</div><div class="step-pill">Click Windows download</div><div class="step-arrow">→</div><div class="step-pill">Run the .exe installer</div><div class="step-arrow">→</div><div class="step-pill">Launch from Start menu</div></div>
<div class="screenshot-placeholder"><span>Screenshot: Claude Desktop installer and Windows Start menu shortcut</span></div>
<div class="warn-box">The Claude Desktop app must stay open while a task is running. If you close it, the task stops.</div>
<h2>Log in</h2>
<p>Sign in with your RealPage enterprise credentials — the same email you use for Claude in the browser. No new account needed.</p>
<h2>Switch to Cowork mode</h2>
<p>At the top of Claude Desktop, click the <strong>Cowork</strong> tab.</p>
<div class="step-flow"><div class="step-pill">Chat</div><div class="step-arrow">|</div><div class="step-pill" style="background:#E6F1FB;color:#185FA5;border-color:#B5D4F4">Cowork ✓</div><div class="step-arrow">|</div><div class="step-pill">Code</div></div>`,
prompt:'I just installed Claude Desktop at RealPage. Walk me through the Cowork tab setup — what should I configure in the first 10 minutes to get the most value?'},

{dept:'core',id:'c-folder',num:'04',group:'Setup',title:'Create your work folder',subtitle:'Set up a safe, dedicated space for Cowork to access.',
content:`<p>Before giving Cowork access to files, create a dedicated folder. Start narrow — don't point Cowork at your entire Documents folder until you're comfortable with how it works.</p>
<h2>Suggested folder structure</h2>
<div class="prompt-block"><code>Claude_Work/
├── context/
│   ├── about-me.md        ← your role, preferences, standing rules
│   └── current-projects.md ← what you're working on right now
├── Inbox/                 ← files to process
├── Drafts/                ← outputs in progress
└── Archive/</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<div class="step-flow"><div class="step-pill">Click "Work in a Folder"</div><div class="step-arrow">→</div><div class="step-pill">Select Claude_Work</div><div class="step-arrow">→</div><div class="step-pill">Select "Always Allow"</div></div>
<div class="screenshot-placeholder"><span>Screenshot: Folder permission dialog in Cowork</span></div>
<h2>Context files — brief Cowork once, not every session</h2>
<p>Create an <code>about-me.md</code> with your name, role, formatting preferences, and standing rules. Reference it at the start of any task:</p>
<div class="prompt-block"><code>"Read about-me.md and current-projects.md before starting. Then..."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me write an about-me.md context file for Claude Cowork. Ask me a few questions about my role and preferences at RealPage, then draft the file.'},

{dept:'core',id:'c-m365',num:'05',group:'Setup',title:'Connect Microsoft 365',subtitle:'Give Cowork access to Outlook, Teams, OneDrive, and SharePoint.',
content:`<div class="step-flow"><div class="step-pill">Click "+" in Cowork</div><div class="step-arrow">→</div><div class="step-pill">Connectors</div><div class="step-arrow">→</div><div class="step-pill">Toggle Microsoft 365</div><div class="step-arrow">→</div><div class="step-pill">Complete OAuth sign-in</div></div>
<div class="screenshot-placeholder"><span>Screenshot: Connectors panel showing Microsoft 365 toggle enabled</span></div>
<table><tr><th>App</th><th>What Claude can do</th></tr>
<tr><td>Outlook</td><td>Read, search, draft emails; summarize threads; flag action items</td></tr>
<tr><td>Teams</td><td>Read channels and threads; summarize conversations; draft replies</td></tr>
<tr><td>OneDrive</td><td>Search and fetch files without downloading</td></tr>
<tr><td>SharePoint</td><td>Access shared document libraries and site files</td></tr>
<tr><td>Word / Excel and supported document types</td><td>Read content directly for analysis or rebuilding</td></tr></table>
<h2>Local folder vs. M365 connector</h2>
<table><tr><th>Capability</th><th>Local folder</th><th>With M365 connector</th></tr>
<tr><td>Read local Office files</td><td>✅</td><td>✅</td></tr>
<tr><td>Access SharePoint libraries</td><td>❌</td><td>✅</td></tr>
<tr><td>Read Teams channels</td><td>❌</td><td>✅</td></tr>
<tr><td>Draft & save Outlook emails</td><td>❌</td><td>✅</td></tr>
<tr><td>Access OneDrive without downloading</td><td>❌</td><td>✅</td></tr></table>
<div class="info-box">RealPage primarily uses Teams. If your team also uses Slack, you can connect it from the same Connectors panel.</div>`,
prompt:'I just connected Microsoft 365 in Claude Cowork. Give me 5 practical workflows I can now run using Outlook, Teams, and SharePoint that I couldn\'t do with local files alone.'},

{dept:'core',id:'c-global',num:'06',group:'Setup',title:'Global instructions',subtitle:'Set your preferences once — applied to every session.',
content:`<div class="step-flow"><div class="step-pill">Settings → Cowork</div><div class="step-arrow">→</div><div class="step-pill">Edit Global Instructions</div><div class="step-arrow">→</div><div class="step-pill">Save</div></div>
<h2>Starter template — customize for your role</h2>
<div class="prompt-block"><code>I work at RealPage in [your department]. I use Microsoft 365 — Outlook, 
Teams, OneDrive, Excel, Word, and PowerPoint. Use professional language 
appropriate for internal business communication. When creating documents, 
include an executive summary at the top. Flag anything that looks 
unusual or needs my review. Save outputs as new files — never modify 
the originals.</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>The safety meta-prompt</h2>
<p>Add this to the start of any complex task to prevent common mistakes:</p>
<div class="prompt-block"><code>When working on this task: ask a clarifying question if anything is 
ambiguous, narrate what you're doing at each step, and pause before 
any action that deletes or overwrites a file. Save all outputs as new 
files rather than modifying originals.</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me write Global Instructions for Claude Cowork. I work at RealPage — ask me about my role and tools, then generate the text I should paste into Settings.'},

{dept:'core',id:'c-tasks',num:'07',group:'Running Tasks',title:'Writing a good task',subtitle:'How to brief Cowork like a smart colleague.',
content:`<p>Don't ask Claude a question — give it a clear assignment. A good task answers three things:</p>
<ul><li><strong>Input:</strong> which files or data?</li><li><strong>Output:</strong> what file, format, or result?</li><li><strong>Rules:</strong> any naming conventions, flags, or formatting preferences?</li></ul>
<h2>Before vs. after</h2>
<table><tr><th>Weak</th><th>Strong</th></tr>
<tr><td>"Help me with this report."</td><td>"I have Q1 data in 'Sales_Q1.xlsx'. Summarize it by region, create a Word doc called 'Q1_Summary.docx' with an executive summary at the top, and flag any region down more than 10% vs. last quarter."</td></tr>
<tr><td>"Organize my downloads."</td><td>"Sort all files in the Inbox folder by type. Rename PDFs as YYYY-MM-DD-description.pdf. Move images to Archive/Images, docs to Drafts. Flag anything older than 90 days."</td></tr></table>
<div class="info-box">Add "then review it and fix any issues" to the end of any request — Claude will self-check before saving. It catches most errors automatically.</div>
<h2>Mid-task instructions</h2>
<p>If you think of something while Cowork is running, click <strong>+</strong> to queue an additional instruction. It adds it without starting over.</p>
<h2>Choosing the right model</h2>
<table><tr><th>Model</th><th>Best for</th></tr>
<tr><td>Haiku</td><td>Quick formatting, simple Q&A, grammar checks</td></tr>
<tr><td>Sonnet</td><td>Most everyday tasks — reports, analysis, drafts</td></tr>
<tr><td>Opus</td><td>Complex, multi-step reasoning tasks</td></tr></table>`,
prompt:'Give me 6 examples of weak Cowork task prompts rewritten as strong ones, covering a mix of document creation, file organization, email drafting, and data analysis. I work at RealPage.'},

{dept:'core',id:'c-schedule',num:'08',group:'Running Tasks',title:'Scheduled tasks',subtitle:'Set recurring tasks once — Cowork runs them automatically.',
content:`<p>Cowork can re-run any workflow on a schedule. Describe the task, then add a frequency — Claude handles the rest.</p>
<h2>Two ways to schedule</h2>
<div class="step-flow"><div class="step-pill">Type /schedule in any Cowork task</div><div class="step-arrow">→</div><div class="step-pill">Describe the task</div><div class="step-arrow">→</div><div class="step-pill">Set the frequency</div><div class="step-arrow">→</div><div class="step-pill">Confirm</div></div>
<p>Or go to <strong>Settings → Cowork → Scheduled Tasks</strong> to manage all active schedules in one place.</p>
<table><tr><th>Frequency</th><th>Example phrase</th></tr>
<tr><td>Daily</td><td>"Every weekday at 8:30 AM"</td></tr>
<tr><td>Weekly</td><td>"Every Monday at 9:00 AM"</td></tr>
<tr><td>Monthly</td><td>"First business day of each month"</td></tr>
<tr><td>Custom</td><td>Cron syntax: <code>0 9 * * 1-5</code></td></tr></table>
<h2>Starter scheduled tasks for any RealPage employee</h2>
<table><tr><th>Task</th><th>Schedule</th></tr>
<tr><td>Morning briefing — unread Outlook emails + Teams highlights + today's calendar</td><td>Weekdays, 8:30 AM</td></tr>
<tr><td>Weekly summary of new files added to your work folder</td><td>Monday, 9:00 AM</td></tr>
<tr><td>Inbox cleanup — sort and rename files added this week</td><td>Friday, 5:00 PM</td></tr>
<tr><td>Monthly report draft from recurring data source</td><td>1st of each month, 8:00 AM</td></tr></table>
<h2>Morning briefing prompt — copy and schedule</h2>
<div class="prompt-block"><code>"Every weekday at 8:30 AM: pull my unread Outlook emails from the 
last 18 hours (subject, sender, one-line summary), read the last 
24 hours of my key Teams channels, and list today's calendar events. 
Compile into a Word doc called 'Briefing_[Date].docx' in my Drafts folder."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<div class="warn-box">Scheduled tasks only run while Claude Desktop is open and your computer is awake. For reliable automation, keep the app running during working hours. Missed tasks run automatically the next time the app opens.</div>`,
prompt:'Help me set up 3 scheduled recurring tasks in Claude Cowork that would save me real time each week — a morning briefing from Outlook and Teams, a weekly file summary, and one task specific to my role. Walk me through the /schedule command and what each prompt should include.'},

{dept:'core',id:'c-projects',num:'09',group:'Running Tasks',title:'Projects',subtitle:'Give Claude a permanent desk for each area of your work.',
content:`<p>A Project is a persistent workspace in Claude — it has its own memory, instructions, files, and scheduled tasks that carry over between sessions. Think of it as assigning Claude a dedicated role for one part of your job.</p>
<div class="info-box">Without Projects, every new chat starts blank. With a Project, Claude already knows your context, preferences, and what you're working on — no re-briefing needed.</div>
<h2>What a Project gives you</h2>
<table><tr><th>Feature</th><th>What it means in practice</th></tr>
<tr><td>Persistent instructions</td><td>Set rules once — "always use USD, flag items over $25K, use our report template" — and they apply to every task in that project</td></tr>
<tr><td>Persistent files</td><td>Upload your chart of accounts, style guide, or report template once; Claude references it every session without reprocessing</td></tr>
<tr><td>Scoped memory</td><td>Claude remembers decisions, preferences, and past work within the project across sessions</td></tr>
<tr><td>Isolated scheduled tasks</td><td>Recurring tasks are tied to the project, not the chat</td></tr></table>
<h2>Good candidates for a dedicated Project</h2>
<ul><li>Weekly or monthly reports you run on a recurring cycle</li><li>A content pipeline or campaign you manage ongoing</li><li>A long-running client or account relationship</li><li>Your team's recurring operations (close process, sprint cycle, hiring pipeline)</li></ul>
<h2>How to create a Project</h2>
<div class="step-flow"><div class="step-pill">Click Projects in sidebar</div><div class="step-arrow">→</div><div class="step-pill">New Project</div><div class="step-arrow">→</div><div class="step-pill">Add instructions</div><div class="step-arrow">→</div><div class="step-pill">Upload reference files</div><div class="step-arrow">→</div><div class="step-pill">Start working</div></div>
<div class="screenshot-placeholder"><span>Screenshot: Projects panel showing active projects with instruction summaries</span></div>
<h2>Project instructions template</h2>
<div class="prompt-block"><code>Project: [Name]
Purpose: [What this project handles]
My role: [Your title and team]
Output format: [e.g., "Always save as .docx with executive summary at top"]
Standing rules: [e.g., "Flag anything over $25K", "Use USD", "Professional tone"]
Reference files in this project: [list key files Claude should always use]
Do not: [anything Claude should never do in this context]</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me set up a Claude Project for the most important recurring work I do. Ask me about my role and what workflows I run repeatedly, then recommend how many projects I should create and what instructions to put in each one.'},

{dept:'core',id:'c-memory',num:'10',group:'Running Tasks',title:'Persistent memory',subtitle:'Claude remembers your preferences across every session.',
content:`<p>On paid plans, Claude maintains a memory of facts about you and your work that persists across all conversations — not just within a single chat or project. You can view, edit, and delete these memories at any time.</p>
<h2>What memory is good for</h2>
<ul><li>Your role, team, and company context — so you never have to re-introduce yourself</li><li>Preferred output formats ("always use bullet points for action items", "executive summary first")</li><li>Recurring project names and acronyms Claude should recognize</li><li>Standing rules ("always flag items over $25K", "never modify original files")</li><li>Tool preferences ("I use Excel, not Google Sheets", "I work in Teams not Slack")</li></ul>
<h2>How to set it up</h2>
<div class="step-flow"><div class="step-pill">Settings → Memory</div><div class="step-arrow">→</div><div class="step-pill">View existing memories</div><div class="step-arrow">→</div><div class="step-pill">Edit or add entries</div></div>
<div class="info-box">Claude also builds memory automatically from your conversations. Review it periodically — if Claude learned something wrong, edit it directly in Settings → Memory.</div>
<h2>Starter memory entries for RealPage employees</h2>
<div class="prompt-block"><code>I work in [Department] at RealPage. My role is [Title].
I use Microsoft 365 — Outlook, Teams, OneDrive, Excel, Word, PowerPoint.
My primary Teams channel for [work area] is [channel name].
Output format preference: executive summary first, bullet points for action items.
Always use USD currency formatting.
Never modify original files — always save outputs as new files.
Flag anything unusual or that needs my review.
Acronyms I use: [list your team's acronyms and what they mean]</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<div class="warn-box">Memory is stored per user account, not per device. It applies across Claude chat surfaces that support memory. Claude Code has its own separate memory workflow and should be configured independently.</div>`,
prompt:'Help me set up my Claude persistent memory for working at RealPage. Ask me about my role, tools, formatting preferences, and standing rules — then generate the memory entries I should add in Settings → Memory.'},

{dept:'core',id:'c-artifacts',num:'11',group:'Running Tasks',title:'Artifacts',subtitle:'A live canvas for documents you build and refine iteratively.',
content:`<p>When Claude creates a document, report, spreadsheet, or piece of code, it can open it in an Artifact panel — a persistent side-by-side workspace next to the chat. Instead of scrolling through long messages, you work in the Artifact directly.</p>
<h2>When Artifacts are most useful</h2>
<table><tr><th>Use case</th><th>Why Artifacts help</th></tr>
<tr><td>Drafting a report or document</td><td>The document stays open while you give feedback in chat — Claude updates it in place</td></tr>
<tr><td>Building a structured template</td><td>Iterate on structure and content without losing the whole doc in chat history</td></tr>
<tr><td>Creating a dashboard or data visualization</td><td>See it render live as Claude builds it</td></tr>
<tr><td>Writing and refining a prompt</td><td>Keep the prompt in the Artifact, test and adjust it in chat</td></tr></table>
<h2>How to use Artifacts</h2>
<p>You don't need to do anything special — when Claude produces something substantial (a document, structured output, or code), it opens in the Artifact panel automatically. You can then:</p>
<ul><li>Ask Claude to revise specific sections without rewriting the whole thing</li><li>Copy the final version directly from the Artifact pane</li><li>Download it as a file</li><li>Ask Claude to keep working on it across multiple turns</li></ul>
<div class="info-box">Practical tip: when drafting a Word report or slide outline, say "keep this in an Artifact and update it as we refine it." This keeps the document clean and separate from your instructions, rather than re-pasting the whole thing every turn.</div>
<h2>Example — iterative report drafting</h2>
<div class="prompt-block"><code>"Draft a Q1 performance summary based on the data in this folder. 
Keep it in an Artifact. I'll give you feedback section by section 
and you update it in place. Start with the executive summary."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Explain how Claude Artifacts work and show me how to use them to iteratively draft and refine a business report. I want to understand how to give section-by-section feedback without losing the document.'},

{dept:'core',id:'c-computer',num:'12',group:'Running Tasks',title:'Computer use',subtitle:'Advanced capability; availability varies by product and workspace.',
content:`<p>Anthropic offers a computer use capability for some Claude environments, but availability varies by product, plan, and workspace configuration. Do not assume it is enabled in Claude Desktop or Cowork for your account.</p>
<div class="warn-box">Treat this as an advanced optional feature. If you do not see computer-use controls in your Claude workspace, skip this section and use connectors or file-based workflows instead.</div>
<h2>What the capability can do</h2>
<ul><li>Observe screen state via screenshots</li><li>Click buttons, links, checkboxes, and menus</li><li>Type text and fill forms</li><li>Navigate between applications</li><li>Execute keyboard shortcuts</li></ul>
<h2>Good use cases at RealPage</h2>
<ul><li>Internal tools and dashboards with no API access</li><li>Legacy systems that predate modern integrations</li><li>Web portals that require complex login flows</li><li>Repetitive copy-paste work between apps that cannot be connected directly</li></ul>
<div class="info-box">Prefer connectors, APIs, or file-based workflows first. Use computer use only if your workspace explicitly enables it and there is no better integration path.</div>
<h2>Before you use it</h2>
<ul><li>Confirm your workspace admin has enabled the feature for your account</li><li>Test it in a low-risk environment before using it on business workflows</li><li>Keep sensitive apps such as password managers, banking tools, and security consoles out of scope</li><li>Review outputs carefully before taking downstream action</li></ul>`,
prompt:'Explain how Claude computer use works in Cowork and when I should use it vs. an MCP connector or browser automation. Give me 3 examples of real tasks at a company like RealPage where computer use would be the right choice.'},

{dept:'core',id:'c-efficiency',num:'13',group:'Running Tasks',title:'Token efficiency',subtitle:'Get more done per session with a few simple habits.',
content:`<p>Claude limits by tokens — the total amount of text processed per session. Every message re-reads the full conversation history, so long chats get expensive fast. A few habits make a real difference.</p>
<table><tr><th>Habit</th><th>Why it helps</th></tr>
<tr><td>Edit your prompt instead of sending a correction</td><td>Replaces the exchange instead of stacking it — Claude re-reads less</td></tr>
<tr><td>Start a fresh chat every 15–20 messages</td><td>Ask Claude to summarize → copy → paste as first message in new chat</td></tr>
<tr><td>Batch multiple questions into one message</td><td>Three tasks in one prompt = one context load, not three</td></tr>
<tr><td>Use Projects for recurring reference files</td><td>Upload once; every session in that project references it without reprocessing</td></tr>
<tr><td>Set Memory & Preferences once</td><td>Stops you re-explaining "I work in Finance at RealPage..." every session</td></tr>
<tr><td>Turn off Search and Tools when not needed</td><td>Tools add tokens to every response even when unused</td></tr>
<tr><td>Spread work across the day</td><td>Claude uses a rolling 5-hour usage window — two sessions beats one marathon</td></tr></table>
<h2>Choosing the right model</h2>
<table><tr><th>Model</th><th>Best for</th></tr>
<tr><td>Haiku</td><td>Quick formatting, grammar checks, simple Q&A</td></tr>
<tr><td>Sonnet</td><td>Most everyday work — reports, analysis, drafts, data tasks</td></tr>
<tr><td>Opus</td><td>Complex multi-step reasoning, deep analysis, hard problems</td></tr></table>
<div class="info-box">For most file organization, report drafting, and data extraction tasks, Sonnet is the right choice. Save Opus for tasks where a first Sonnet attempt wasn't sufficient.</div>`,
prompt:'Give me a practical cheat sheet for using Claude Cowork efficiently. What are the most important habits to avoid hitting token limits, and how do I choose between Haiku, Sonnet, and Opus for different types of work?'},

// ── FINANCE ───────────────────────────────────────────────────────────────
{dept:'fin',id:'f-overview',num:'F1',group:'Finance Module',title:'Finance overview',subtitle:'What Cowork can do for the Finance org at RealPage.',
content:`<div class="dept-banner" style="background:#EAF3DE;border:0.5px solid #C0DD97"><span style="font-size:20px">📊</span><div><strong style="color:#27500A">Finance Module</strong><br><span style="color:#3B6D11;font-size:12px">Complete the Core sections first, then work through these Finance-specific workflows.</span></div></div>
<p>Cowork is particularly powerful for Finance because so much Finance work follows repeatable patterns: extract data from files, compare two datasets, flag anomalies, produce a formatted output. These are exactly the tasks Cowork was built for.</p>
<h2>High-value Finance workflows covered in this module</h2>
<table><tr><th>Workflow</th><th>Time saved</th></tr>
<tr><td>Invoice extraction and organization</td><td>Hours → minutes</td></tr>
<tr><td>AP/AR reconciliation against bank statements</td><td>Manual matching → automated output</td></tr>
<tr><td>Budget vs. actuals variance analysis</td><td>Build + format in one step</td></tr>
<tr><td>Multi-entity consolidation</td><td>Template-driven rebuild</td></tr>
<tr><td>Month-end close tracking and status updates</td><td>Automated tracker + Teams post</td></tr>
<tr><td>Audit support schedule preparation</td><td>Index + PBC matching automated</td></tr></table>
<div class="info-box">Install the Financial Analysis plugin before starting: Customize → Browse Plugins → Finance → Financial Analysis. It significantly improves accuracy on reconciliation and modeling tasks.</div>`,
prompt:'I work in Finance at RealPage. Give me an overview of the top 5 ways Claude Cowork can save me time on everyday Finance tasks — focus on Excel-heavy work, AP/AR, and month-end close.'},

{dept:'fin',id:'f-invoices',num:'F2',group:'Finance Module',title:'Invoice processing',subtitle:'Sort, rename, and extract invoice data at scale.',
content:`<div class="prompt-block"><code>"I have a folder of PDF invoices. Organize them into subfolders by 
month. Within each month folder, create a subfolder per currency 
(USD, EUR, etc.). Read each PDF to extract invoice date and currency."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Extract to Excel summary</h2>
<div class="prompt-block"><code>"Read all PDFs in Invoices_To_Process. Extract: Vendor Name, Invoice 
Date, Invoice Number, Total Amount. Create 'Invoice_Summary_[Month].xlsx' 
with those four columns. Sort by Vendor Name. Flag invoices over $10,000 
in a 'Review Flag' column."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Rename after sorting</h2>
<div class="prompt-block"><code>"Rename all PDFs using the format: VendorName_Date_Amount.pdf"</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<div class="screenshot-placeholder"><span>Screenshot: Cowork progress panel showing PDF reads and Excel output</span></div>`,
prompt:'Walk me through using Claude Cowork to process a folder of 40 vendor invoices — sorting, renaming, and extracting data to Excel. What should I verify to make sure the output is accurate?'},

{dept:'fin',id:'f-recon',num:'F3',group:'Finance Module',title:'Reconciliation',subtitle:'Match invoices to bank statements automatically.',
content:`<div class="prompt-block"><code>"Reconcile the invoices in this folder against the bank statement in 
'BankStatement_[Month].xlsx'. Create an Excel file with tabs for: 
Matched invoices, Amount mismatches, Unpaid invoices, and Bank 
transactions with no matching invoice. Flag duplicate invoice numbers."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Three-way match (PO + invoice + receipt)</h2>
<div class="prompt-block"><code>"I have three folders: POs (PDFs), Invoices (PDFs), and GoodsReceipts 
(Excel). Match each invoice to its PO and goods receipt by PO number. 
Create 'ThreeWayMatch_[Month].xlsx' with columns: PO#, Vendor, PO Amount, 
Invoice Amount, Receipt Amount, Match Status, and Flag."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<div class="warn-box">Always verify figures in the output before using for reporting. Ask Cowork to show its underlying calculations so you can spot-check.</div>`,
prompt:'Help me build an AP reconciliation workflow in Claude Cowork. What format should my bank statement export be in? How should I handle edge cases like partial payments and duplicate invoice numbers?'},

{dept:'fin',id:'f-bva',num:'F4',group:'Finance Module',title:'Variance analysis & FP&A',subtitle:'BvA, rolling forecasts, and scenario models.',
content:`<h2>Budget vs. actuals</h2>
<div class="prompt-block"><code>"Compare 'Budget_Q1.xlsx' and 'Actuals_Q1.xlsx' by department and line 
item. Create 'Q1_Variance_Analysis.xlsx' with Budget, Actual, Variance ($), 
Variance (%) columns. Flag rows where variance exceeds 10% either 
direction. Use green/red conditional formatting."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Rolling forecast update</h2>
<div class="prompt-block"><code>"Update 'Forecast_Q2_2026.xlsx' by replacing Q1 forecast figures with 
Q1 actuals from 'Actuals_Q1_2026.xlsx'. Keep Q2–Q4 unchanged. Add a 
Last Updated timestamp and a full-year summary tab."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Three-scenario model</h2>
<div class="prompt-block"><code>"Using 'Budget_FY2026.xlsx' as base, build a three-scenario model 
(Base, Upside +10% revenue, Downside -15% revenue) in 
'Scenario_Model_FY2026.xlsx'. Show impact on gross margin, EBITDA, 
and cash on a summary tab."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me build a rolling 12-month forecast model in Claude Cowork. My current forecast is in Excel and I need to lock in Q1 actuals. Walk me through the prompt sequence.'},

{dept:'fin',id:'f-close',num:'F5',group:'Finance Module',title:'Month-end close',subtitle:'Trackers, flux analysis, and Teams status updates.',
content:`<h2>Close tracker</h2>
<div class="prompt-block"><code>"Create 'MonthEnd_Close_Tracker_[Month].xlsx' with a Checklist tab: 
Task, Owner, Due Date, Status, Notes. Pre-populate with: bank recon, 
AR aging review, AP accruals, intercompany eliminations, flux analysis, 
management reporting package. Highlight overdue items in red."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Flux analysis</h2>
<div class="prompt-block"><code>"Compare 'Actuals_[Month].xlsx' vs 'Actuals_[Prior Month].xlsx'. 
Create a flux analysis showing change by line item. Flag any line 
with month-over-month change greater than 15% or $50K. Include a 
commentary column."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Teams status update (M365 connector required)</h2>
<div class="prompt-block"><code>"Using the close tracker, draft a brief status update for the 
Finance-Close Teams channel: overall % complete, items at risk, 
blockers. Under 150 words, professional tone."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Scheduled close reminder</h2>
<div class="prompt-block"><code>"On the 25th of every month at 9 AM, read the close tracker and 
summarize all Open tasks due within 5 days."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me build a month-end close support workflow in Claude Cowork — close tracker, flux analysis, and automated Teams status update. What should I verify before sharing outputs with leadership?'},

{dept:'fin',id:'f-audit',num:'F6',group:'Finance Module',title:'Audit & compliance',subtitle:'Audit schedules, duplicate detection, PBC lists, SOX summaries.',
content:`<div class="warn-box">Cowork activity is not captured in RealPage's audit logs. Do not use Cowork for regulated workloads requiring an audit trail until IT/Security confirms it is appropriate.</div>
<h2>Audit support index</h2>
<div class="prompt-block"><code>"Create an audit support index in Excel listing each file in the 
Reconciliation folder, the schedule it supports (e.g., 'Cash – Note 4'), 
preparer, and review status (leave blank for me to fill in)."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Duplicate payment detection</h2>
<div class="prompt-block"><code>"Read 'Payments_Q1_2026.xlsx'. Identify duplicate payments — same 
vendor, same amount, within 5 business days. Create a report with: 
Vendor, Amount, Payment Date 1, Payment Date 2, Notes column."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>PBC list population</h2>
<div class="prompt-block"><code>"For each request in column A of 'Audit_PBC_List.xlsx', check whether 
a matching file exists in Reconciliation and Reports_Draft. Update 
column B with 'File Found' or 'Missing', column C with filename."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'How should I use Claude Cowork to prepare for our annual external audit? I need a PBC tracking list, organized support schedules, and a duplicate payment check. What should I verify before giving anything to auditors?'},

{dept:'sales',id:'s-overview',num:'S1',group:'Sales Module',title:'Sales overview',subtitle:'How Cowork accelerates sales workflows at RealPage.',
content:`<div class="dept-banner" style="background:#FAEEDA;border:0.5px solid #FAC775"><span style="font-size:20px">🤝</span><div><strong style="color:#633806">Sales / Account Management Module</strong><br><span style="color:#854F0B;font-size:12px">Complete the Core sections first, then work through these sales-specific workflows.</span></div></div>
<p>Sales teams spend enormous time on prep, follow-up, and reporting — work that follows predictable patterns. Cowork handles the repetitive parts so you can focus on relationships and closing.</p>
<h2>High-value Sales workflows in this module</h2>

<tr><td>CRM data cleanup and enrichment</td><td>Standardize messy pipeline data</td></tr>

<tr><td>Pipeline reporting</td><td>Weekly summaries from CRM exports</td></tr>

{dept:'sales',id:'s-research',num:'S2',group:'Sales Module',title:'Account research & meeting prep',subtitle:'One-pagers and call briefs in minutes.',
content:`<h2>Account research brief</h2>
<div class="prompt-block"><code>"Research [Company Name]. Create a 1-page Word brief covering: 
company overview, key products/services, recent news, likely pain 
points relevant to real estate software, and key contacts. 
Save as '[CompanyName]_Brief.docx'."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Pre-call prep from email + Teams history (M365 connector required)</h2>
<div class="prompt-block"><code>"I have a meeting with [Name] at [Company] at 2pm. Search my Outlook 
for emails from them in the last 60 days. Check the [Teams channel] 
for any recent mentions. Summarize: open issues, last commitments made, 
what I should be prepared to address. Save as a Word doc."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Competitor comparison</h2>
<div class="prompt-block"><code>"Create a competitive comparison between RealPage and [Competitor] 
covering: key features, pricing model, typical customer profile, 
known weaknesses. Format as a one-page Word doc I can reference on calls."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me build a pre-call research workflow in Claude Cowork. I have a meeting with a prospect in 30 minutes. What\'s the fastest way to pull together a useful brief from Outlook, Teams, and web research?'},

{dept:'sales',id:'s-outreach',num:'S3',group:'Sales Module',title:'Proposals & follow-up',subtitle:'Consistent, personalized outreach at scale.',
content:`<h2>Follow-up email after a call (M365 connector required)</h2>
<div class="prompt-block"><code>"Read my last email thread with [Contact] in Outlook. Draft a 
follow-up email that: thanks them for the call, recaps the 3 key 
points discussed, lists the next steps we agreed on, and includes 
a soft CTA. Professional tone, under 200 words. Save to Drafts."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Proposal first draft</h2>
<div class="prompt-block"><code>"Using the notes in 'Discovery_[CompanyName].docx', draft a proposal 
Word document for [Company]. Include: executive summary of their 
problem, our recommended solution, key benefits, and proposed next 
steps. Use our standard proposal template if one exists in the folder."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Batch follow-up drafts from pipeline export</h2>
<div class="prompt-block"><code>"Read 'Pipeline_Export.xlsx'. For each deal in 'Proposal Sent' stage 
with no activity in 14+ days, draft a brief check-in email. 
Personalize the opening line using the company name and deal notes. 
Save each to Outlook Drafts — do not send."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Help me set up a follow-up workflow in Claude Cowork. After sales calls, I want to automatically draft a follow-up email based on my Outlook thread history. Walk me through the prompt and what to review before sending.'},

{dept:'sales',id:'s-pipeline',num:'S4',group:'Sales Module',title:'Pipeline reporting',subtitle:'Weekly summaries and CRM cleanup from exports.',
content:`<h2>Weekly pipeline summary</h2>
<div class="prompt-block"><code>"Read 'Pipeline_Export.xlsx'. Create a Word summary doc with: 
total pipeline value by stage, deals closing this month, top 5 
opportunities by value, and any deals that have gone cold (no 
activity in 21+ days). Professional format suitable for my manager."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>CRM data cleanup</h2>

each issue with the row number. Save as 'CRM_Cleanup_Review.xlsx'."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
<h2>Scheduled weekly pipeline report</h2>
<div class="prompt-block"><code>"Every Friday at 4:30 PM, read the latest pipeline export in my 
Inbox folder and generate a weekly pipeline summary Word doc. 
Save to Drafts folder."</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`,
prompt:'Build me a weekly pipeline reporting workflow in Claude Cowork. I export my CRM to Excel every Friday. What prompts give me the most useful summary, and how do I schedule it to run automatically?'},

// ── PRODUCT & ENG ─────────────────────────────────────────────────────────
{dept:'eng',id:'e-overview',num:'E1',group:'Product & Eng Module',title:'Product & Eng overview',subtitle:'How Cowork fits into product and engineering workflows.',
content:`<div class="dept-banner" style="background:#EEEDFE;border:0.5px solid #CECBF6"><span style="font-size:20px">⚙️</span><div><strong style="color:#3C3489">Product & Engineering Module</strong><br><span style="color:#534AB7;font-size:12px">Complete the Core sections first, then work through these role-specific workflows.</span></div></div>
<p>For product managers and engineers, Cowork complements Claude Code — handling documentation, sprint reporting, meeting synthesis, and spec drafting while Code handles the actual development work.</p>
<table><tr><th>Workflow</th><th>Benefit</th></tr>
<tr><td>PRD and spec drafting</td><td>First draft from notes in minutes</td></tr>

const DEPT_LABELS = {core:'Core',fin:'Finance',sales:'Sales',eng:'Product & Eng',hr:'HR / People',mkt:'Marketing',legal:'Legal',cs:'Customer Success'};
let currentDept = 'core';
let visited = new Set(JSON.parse(localStorage.getItem('rp2_visited')||'[]'));

function deptSections(d){ return ALL_SECTIONS.filter(s=>s.id.startsWith(d==='core'?'c-':d==='fin'?'f-':d==='sales'?'s-':d==='eng'?'e-':d==='hr'?'h-':d==='mkt'?'m-':d==='legal'?'l-':'x-')) }

function buildDeptBar(){
  const bar=document.getElementById('dept-bar');
  bar.innerHTML='';
  DEPTS.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='dept-btn '+(d.cls||'')+(d.id===currentDept?' active':'');
    btn.textContent=d.label;
    btn.onclick=()=>switchDept(d.id);
    bar.appendChild(btn);
  });
}

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  const secs=deptSections(currentDept);
  let lastGroup='';
  secs.forEach(s=>{
    if(s.group!==lastGroup){
      if(lastGroup) nav.insertAdjacentHTML('beforeend','<div class="nav-divider"></div>');
      nav.insertAdjacentHTML('beforeend',`<div class="nav-group">${s.group}</div>`);
      lastGroup=s.group;
    }
    const v=visited.has(s.id)?'visited':'';
    nav.insertAdjacentHTML('beforeend',`
      <button class="nav-item ${v}" id="nav-${s.id}" onclick="showSection('${s.id}')">
        <span class="nav-num">${s.num}</span>
        <span style="flex:1;text-align:left;line-height:1.3">${s.title}</span>
        <span class="check"><svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="6.5" fill="#378ADD" opacity=".15"/><path d="M3.5 6.5l2 2 4-4" stroke="#185FA5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
      </button>`);
  });
}

function updateProgress(){
  const all=ALL_SECTIONS.length;
  const v=visited.size;
  const pct=Math.round(v/all*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=`${v} of ${all} sections visited`;
}

function switchDept(deptId){
  currentDept=deptId;
  buildDeptBar();
  buildNav();
  const first=deptSections(deptId)[0];
  if(first) showSection(first.id);
}

function showSection(id){
  const s=ALL_SECTIONS.find(x=>x.id===id);
  if(!s) return;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+id);
  if(navEl){navEl.classList.add('active');navEl.classList.add('visited');}
  visited.add(id);
  localStorage.setItem('rp2_visited',JSON.stringify([...visited]));
  updateProgress();
  const d=DEPTS.find(x=>x.id===s.dept)||DEPTS[0];
  const prompt=encodeURIComponent(s.prompt);
  document.getElementById('section-content').innerHTML=`
    <div class="section-badge ${d.badgeCls}">${s.num} — ${DEPT_LABELS[s.dept]||s.dept}</div>
    <h1>${s.title}</h1>
    <p class="subtitle">${s.subtitle}</p>
    <div class="section-body">${s.content}</div>
    <div class="go-deeper">
      <div class="go-deeper-text">
        <strong>Practice with Claude</strong>
        <span>Open a live conversation about this topic with a pre-written prompt</span>
      </div>
      <a class="go-deeper-btn" href="https://claude.ai/new?q=${prompt}" target="_blank" rel="noopener">Go deeper →</a>
    </div>`;
  document.getElementById('main').scrollTop=0;
}

function copyCode(btn){
  const code=btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const orig=btn.textContent;
    btn.textContent='Copied!';
    btn.style.color='#9FE1CB';
    setTimeout(()=>{btn.textContent=orig;btn.style.color='';},2000);
  });
}

function resetProgress(){
  visited=new Set();
  localStorage.setItem('rp2_visited','[]');
  updateProgress();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('visited'));
}

buildDeptBar();
buildNav();
updateProgress();
showSection('c-welcome');
</script>
</body>
</html>
